<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instant/Creator — Creator Commerce OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Caveat:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.13/dist/framer-motion.js"></script>
  <style>
    :root {
      /* crea8tors-inspired palette */
      --cream: #F2EBDD;
      --sand: #E6DDCB;
      --paper: #FBF7EE;
      --ink: #14110E;
      --orange: #FF4E22;
      --orange-ink: #C2390F;
      --lime: #C9F24A;
      --purple: #2A0068;
      --brown: #4A4034;
      --muted: #8A7E6C;

      /* fonts */
      --font-head: "Bricolage Grotesque", "Helvetica Neue", system-ui, sans-serif;
      --font-serif: "Instrument Serif", Georgia, serif;
      --font-script: "Caveat", "Bradley Hand", cursive;
      --font-sans: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, monospace;

      --radius: 26px;

      /* legacy tokens retained for the untouched closing/footer section */
      --surface: #ffffff;
      --fg: #14110E;
      --border: color-mix(in srgb, var(--ink) 12%, transparent);
      --shell: #14110E;
      --shadow: 0 30px 80px rgba(20, 17, 14, 0.14);
      --font-display: "Helvetica Neue", "SF Pro Display", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .page { overflow: hidden; }
    .wrap { width: min(1240px, calc(100% - 48px)); margin: 0 auto; }
    .center { text-align: center; }

    /* ---------- shared type ---------- */
    .eyebrow {
      font-family: var(--font-script);
      font-size: 27px;
      font-weight: 700;
      line-height: 1;
      color: var(--orange-ink);
    }
    .eyebrow.lime { color: var(--lime); }
    .eyebrow.orange { color: var(--orange-ink); }

    .display {
      margin: 20px 0 20px;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(54px, 7.4vw, 108px);
      line-height: 0.9;
      letter-spacing: -0.035em;
      max-width: 13ch;
    }
    .big {
      margin: 14px 0 0;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(42px, 5.6vw, 84px);
      line-height: 0.94;
      letter-spacing: -0.035em;
    }
    .accent { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--orange); letter-spacing: -0.01em; }
    .ital { font-style: italic; color: var(--orange); }
    .cream-fg { color: var(--cream); }
    .ink-fg { color: var(--ink); }

    .lead {
      max-width: 44ch;
      color: var(--brown);
      font-size: clamp(18px, 1.35vw, 21px);
      line-height: 1.5;
      margin: 0 0 30px;
      font-weight: 500;
    }
    .hl {
      background: var(--lime);
      color: var(--ink);
      font-weight: 700;
      padding: 0.06em 0.4em;
      border-radius: 8px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    /* ---------- buttons ---------- */
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 26px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      border: 1px solid var(--orange);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }
    .pill-btn svg { width: 18px; height: 18px; }
    .pill-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(255, 78, 34, 0.32); }
    .pill-btn.ghost { background: transparent; color: var(--ink); border-color: color-mix(in srgb, var(--ink) 24%, transparent); }
    .pill-btn.ghost:hover { background: rgba(20, 17, 14, 0.05); box-shadow: none; border-color: var(--ink); }
    .pill-btn.dark { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .pill-btn.dark:hover { box-shadow: 0 14px 30px rgba(20, 17, 14, 0.32); }

    /* ---------- floating pill nav ---------- */
    .topbar {
      position: sticky;
      top: 18px;
      z-index: 60;
      pointer-events: none;
    }
    .topbar .wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .chip {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-weight: 600;
      font-size: 14.5px;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(20, 17, 14, 0.12);
      transition: transform 160ms ease;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.cta { background: var(--orange); color: #fff; }
    .wordmark {
      pointer-events: auto;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.04em;
      color: var(--ink);
    }
    .wordmark span { color: var(--orange); }

    /* ---------- hero ---------- */
    .hero { position: relative; padding: 40px 0 96px; }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(500px, 0.98fr);
      gap: 56px;
      align-items: center;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .micro {
      display: flex; gap: 22px; flex-wrap: wrap; margin-top: 34px;
      color: var(--brown); font-size: 13px; font-weight: 600;
    }
    .micro span { display: inline-flex; align-items: center; gap: 8px; }
    .micro svg { width: 16px; height: 16px; color: var(--orange); }

    .hero-stage { position: relative; }
    .sticker {
      position: absolute;
      z-index: 5;
      background: #fff;
      color: var(--ink);
      border-radius: 14px;
      padding: 9px 15px;
      font-family: var(--font-script);
      font-size: 21px;
      font-weight: 700;
      line-height: 1.05;
      box-shadow: 0 16px 34px rgba(20, 17, 14, 0.16);
    }
    .sticker.purple { background: var(--purple); color: #fff; }
    .sticker.s1 { top: -20px; right: 8%; transform: rotate(-6deg); }
    .sticker.s2 { bottom: 44px; left: -20px; transform: rotate(5deg); }
    .doodle { position: absolute; left: -40px; top: 40%; width: 78px; color: var(--orange); z-index: 4; }

    /* ---------- console mockup ---------- */
    .console {
      position: relative;
      border-radius: 24px;
      background: #fff;
      border: 1px solid var(--sand);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .console-top {
      height: 54px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; border-bottom: 1px solid var(--sand); background: var(--paper);
    }
    .dots { display: flex; gap: 8px; }
    .dots i { width: 11px; height: 11px; border-radius: 50%; background: var(--sand); }
    .dots i:first-child { background: var(--orange); }
    .console-title { color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    .console-body { display: grid; grid-template-columns: 150px 1fr; min-height: 500px; }
    .sidebar { border-right: 1px solid var(--sand); background: var(--paper); padding: 18px 12px; }
    .side-item { height: 40px; display: flex; align-items: center; gap: 10px; border-radius: 11px; color: var(--muted); padding: 0 12px; margin-bottom: 4px; font-size: 13px; font-weight: 600; }
    .side-item.active { color: #fff; background: var(--ink); }
    .side-item svg { width: 16px; height: 16px; }
    .dash { padding: 22px; display: grid; gap: 16px; align-content: start; }
    .dash-head { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
    .dash-head h3 { margin: 0; font-family: var(--font-head); font-size: 26px; line-height: 1; letter-spacing: -0.03em; font-weight: 800; }
    .kicker { display: block; color: var(--muted); font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .date-pill { font-family: var(--font-mono); font-size: 11px; color: var(--brown); border: 1px solid var(--sand); padding: 7px 10px; border-radius: 999px; white-space: nowrap; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .metric { padding: 14px; border-radius: 16px; min-height: 112px; border: 1px solid var(--sand); background: var(--paper); }
    .metric.lime { background: var(--lime); border-color: var(--lime); }
    .metric.orange { background: var(--orange); border-color: var(--orange); }
    .metric label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; color: var(--muted); }
    .metric.orange label, .metric.orange small { color: rgba(255,255,255,0.82); }
    .metric.lime label, .metric.lime small { color: rgba(20,17,14,0.62); }
    .metric strong { display: block; font-family: var(--font-head); font-size: 27px; line-height: 1; letter-spacing: -0.03em; font-weight: 800; font-variant-numeric: tabular-nums; }
    .metric.orange strong { color: #fff; }
    .metric small { display: block; color: var(--muted); margin-top: 8px; font-size: 11.5px; }
    .main-panels { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 12px; }
    .panel { padding: 16px; border-radius: 16px; border: 1px solid var(--sand); background: var(--paper); }
    .table-label { display: block; color: var(--muted); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .bar-chart { height: 130px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; align-items: end; padding-top: 8px; }
    .bar { border-radius: 3px 3px 0 0; background: var(--ink); min-height: 24px; }
    .bar.hot { background: var(--orange); }
    .creator-row { display: grid; grid-template-columns: 32px 1fr auto; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--sand); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--cream); border: 1px solid var(--sand); display: grid; place-items: center; font-size: 11px; font-weight: 800; color: var(--ink); }
    .name { font-weight: 700; font-size: 13px; }
    .sub { color: var(--muted); font-size: 12px; }
    .money { font-family: var(--font-mono); font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums; }

    /* ---------- ticker ---------- */
    .ticker { border-block: 1px solid var(--ink); background: var(--ink); color: var(--cream); overflow: hidden; }
    .ticker-track { display: flex; width: max-content; gap: 42px; padding: 18px 0; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; align-items: center; }
    .ticker-track strong { color: var(--lime); font-weight: 500; }
    .ticker-track span { color: rgba(242, 235, 221, 0.5); }
    .ticker-track em { color: var(--orange); font-style: normal; }

    /* ---------- bands ---------- */
    .band { padding: 104px 0; }
    .band.tight { padding-top: 0; }
    .band.dark { background: var(--ink); color: var(--cream); position: relative; }
    .band.orange { background: var(--orange); color: var(--ink); }

    .split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 0.62fr); gap: 56px; align-items: end; margin-bottom: 44px; }
    .split-copy { color: var(--brown); margin: 0; font-size: 18px; font-weight: 500; max-width: 46ch; }

    /* stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .stat { border-radius: var(--radius); padding: 28px; min-height: 190px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 200ms ease; }
    .stat:hover { transform: translateY(-4px); }
    .stat strong { font-family: var(--font-head); font-weight: 800; font-size: clamp(40px, 3.6vw, 58px); line-height: 0.92; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .stat span { font-family: var(--font-script); font-size: 21px; font-weight: 600; line-height: 1.1; }
    .stat.black { background: var(--ink); color: var(--cream); }
    .stat.black strong { color: var(--lime); }
    .stat.black span { color: rgba(242, 235, 221, 0.7); }
    .stat.orange { background: var(--orange); color: var(--ink); }
    .stat.orange span { color: rgba(20, 17, 14, 0.78); }
    .stat.lime { background: var(--lime); color: var(--ink); }
    .stat.lime span { color: rgba(20, 17, 14, 0.66); }

    /* feature cards */
    .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .feature { border-radius: var(--radius); padding: 30px; min-height: 320px; display: flex; flex-direction: column; justify-content: space-between; gap: 22px; background: #fff; border: 1px solid var(--sand); }
    .feature.dark { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .feature.lime { background: var(--lime); border-color: var(--lime); }
    .feature h3 { margin: 0 0 10px; font-family: var(--font-head); font-size: 27px; line-height: 1.04; letter-spacing: -0.02em; font-weight: 800; }
    .feature p { margin: 0; color: var(--brown); font-size: 15px; font-weight: 500; }
    .feature.dark p { color: rgba(242, 235, 221, 0.7); }
    .iconbox { width: 50px; height: 50px; border-radius: 14px; display: grid; place-items: center; background: var(--cream); color: var(--ink); }
    .feature.dark .iconbox { background: rgba(242, 235, 221, 0.1); color: var(--lime); }
    .feature.lime .iconbox { background: var(--ink); color: var(--lime); }
    .iconbox svg { width: 22px; height: 22px; }
    .mini-ledger { display: grid; gap: 8px; }
    .mini-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 12px; border-radius: 12px; background: rgba(242, 235, 221, 0.06); font-size: 13px; font-weight: 600; }
    .mini-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 8px; }

    /* how-it-works steps */
    .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 44px; position: relative; z-index: 2; }
    .step-card { border-radius: var(--radius); padding: 26px; min-height: 240px; display: flex; flex-direction: column; justify-content: space-between; gap: 20px; background: rgba(242, 235, 221, 0.04); border: 1px solid rgba(242, 235, 221, 0.14); }
    .step-num { font-family: var(--font-head); font-weight: 800; font-size: 40px; color: var(--orange); line-height: 1; }
    .step-card h3 { margin: 0 0 8px; font-family: var(--font-head); font-size: 22px; line-height: 1.12; letter-spacing: -0.02em; font-weight: 800; color: var(--cream); }
    .step-card p { margin: 0; color: rgba(242, 235, 221, 0.66); font-size: 14px; font-weight: 500; }
    .step-icon { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(242, 235, 221, 0.2); display: grid; place-items: center; color: var(--lime); }
    .step-icon svg { width: 20px; height: 20px; }
    .watermark { position: absolute; right: -2vw; bottom: -4vw; font-family: var(--font-head); font-weight: 800; font-size: 34vw; line-height: 0.8; color: rgba(242, 235, 221, 0.035); pointer-events: none; z-index: 0; letter-spacing: -0.05em; }

    /* ---------- product lab (interactive) ---------- */
    .lab-head { margin-bottom: 40px; }
    .product-lab { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: stretch; }
    .controls { border-radius: var(--radius); background: #fff; border: 1px solid var(--sand); padding: 16px; align-self: start; position: sticky; top: 92px; }
    .tab-btn { width: 100%; min-height: 56px; border: 0; border-radius: 14px; background: transparent; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 16px; color: var(--brown); font-family: var(--font-head); font-weight: 700; font-size: 16px; margin-bottom: 6px; transition: background 160ms ease, color 160ms ease; }
    .tab-btn:hover { background: var(--cream); }
    .tab-btn.active { background: var(--ink); color: #fff; }
    .tab-btn span:last-child { font-family: var(--font-mono); font-size: 11px; opacity: 0.6; }
    .lab-stage { border-radius: var(--radius); border: 1px solid var(--sand); background: #fff; box-shadow: var(--shadow); overflow: hidden; padding: 28px; min-height: 540px; }
    .lab-grid { display: grid; grid-template-columns: 1fr 0.9fr; gap: 20px; height: 100%; }
    .lab-title { margin: 0; font-family: var(--font-head); font-size: clamp(28px, 2.6vw, 38px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; }
    .lab-copy { color: var(--brown); margin: 12px 0 22px; max-width: 48ch; font-size: 15px; font-weight: 500; }
    .module-card { border: 1px solid var(--sand); background: var(--paper); border-radius: 18px; padding: 18px; }
    .campaign-list { display: grid; gap: 10px; }
    .campaign-item { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; border: 1px solid var(--sand); background: #fff; border-radius: 14px; padding: 12px 14px; }
    .rank { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--cream); font-family: var(--font-mono); font-size: 11px; color: var(--brown); }
    .order-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid var(--sand); }
    .status { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.01em; white-space: nowrap; }
    .status.delivered { background: color-mix(in srgb, var(--lime) 55%, white); color: var(--brown); }
    .status.returned { background: color-mix(in srgb, var(--orange) 20%, white); color: var(--orange-ink); }
    .status.pending { background: var(--cream); color: var(--brown); }
    .estimator { margin-top: 18px; display: grid; gap: 14px; }
    .field { display: grid; gap: 7px; }
    .field label { color: var(--brown); font-size: 12.5px; font-weight: 700; }
    .field input { width: 100%; height: 48px; border-radius: 12px; border: 1px solid var(--sand); background: #fff; padding: 0 14px; color: var(--ink); outline: none; font-variant-numeric: tabular-nums; font-weight: 600; }
    .field input:focus { border-color: var(--orange); }
    .estimate-out { display: grid; gap: 6px; border-radius: 18px; background: var(--ink); color: var(--cream); padding: 18px; margin-top: 6px; }
    .estimate-out small { color: rgba(242, 235, 221, 0.6); font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; font-size: 10.5px; }
    .estimate-out strong { font-family: var(--font-head); font-size: 32px; line-height: 1; letter-spacing: -0.03em; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--lime); }

    /* payouts */
    .payout-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid var(--sand); cursor: pointer; }
    .payout-check { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; border-radius: 7px; border: 1px solid var(--sand); display: grid; place-items: center; margin: 0; transition: background 140ms ease; }
    .payout-check:checked { background: var(--orange); border-color: var(--orange); }
    .payout-check:checked::after { content: ""; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }
    .payout-total { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--sand); }

    /* ---------- legacy: closing / footer (kept intact) ---------- */
    section { padding: 112px 0; }
    .btn {
      min-height: 44px; border-radius: 999px; border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent); color: var(--fg);
      padding: 0 20px; display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      font-size: 14px; font-weight: 590; letter-spacing: 0.02em;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--fg) 24%, var(--border)); }
    .btn svg { width: 16px; height: 16px; }
    .closing { padding: 116px 0 126px; }
    .close-card {
